<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section">
          <span class="label">RECORDS</span>
          <div class="panel-records" id="panel-records"></div>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">TEMA</span>
          <label class="theme-toggle-label" for="theme-toggle">
            <div class="toggle-switch">
              <input type="checkbox" id="theme-toggle" />
              <span class="toggle-slider"></span>
            </div>
            <span id="theme-mode-text" class="toggle-mode-text">Oscuro</span>
          </label>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <div id="gameover-content" class="hidden">
          <div id="name-entry">
            <p id="new-record-msg" class="new-record-msg"></p>
            <div class="name-row">
              <input type="text" id="player-name" placeholder="Tu nombre" maxlength="12" autocomplete="off" />
              <button id="save-score-btn">Guardar</button>
            </div>
          </div>

          <div id="leaderboard-section">
            <table class="leaderboard-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Jugador</th>
                  <th>Score</th>
                  <th>Líneas</th>
                  <th>Combo</th>
                </tr>
              </thead>
              <tbody id="leaderboard-body"></tbody>
            </table>
          </div>

          <button id="reset-records-btn">Borrar records</button>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
