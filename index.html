<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">TEMA</span>
          <label class="theme-toggle-label" for="theme-toggle">
            <div class="toggle-switch">
              <input type="checkbox" id="theme-toggle" />
              <span class="toggle-slider"></span>
            </div>
            <span id="theme-mode-text" class="toggle-mode-text">Oscuro</span>
          </label>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden" data-state="gameover">
      <!-- Estado: game over -->
      <div class="overlay-box" id="gameover-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>
        <button id="restart-btn">Reiniciar</button>
      </div>

      <!-- Estado: pausa -->
      <div class="overlay-box pause-box hidden" id="pause-box">
        <p class="pause-title">PAUSA</p>
        <div class="pause-menu">
          <button id="resume-btn" class="menu-btn">Reanudar</button>
          <button id="restart-pause-btn" class="menu-btn">Reiniciar</button>

          <div class="menu-divider"></div>

          <div class="start-level-row">
            <label for="start-level-select" class="menu-label">Nivel inicial</label>
            <select id="start-level-select" class="menu-select"></select>
          </div>

          <div class="menu-divider"></div>

          <button id="toggle-controls-btn" class="menu-btn menu-btn-secondary">Ver controles</button>
          <div class="pause-controls hidden" id="pause-controls">
            <ul>
              <li><kbd>←</kbd><kbd>→</kbd> mover</li>
              <li><kbd>↑</kbd> rotar</li>
              <li><kbd>↓</kbd> bajar lento</li>
              <li><kbd>Space</kbd> caída rápida</li>
              <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
            </ul>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
