<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>
        <div class="panel-section" id="combo-section" style="display:none">
          <span class="label">COMBO</span>
          <span class="value combo-value" id="combo">0</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">TEMA</span>
          <label class="theme-toggle-label" for="theme-toggle">
            <div class="toggle-switch">
              <input type="checkbox" id="theme-toggle" />
              <span class="toggle-slider"></span>
            </div>
            <span id="theme-mode-text" class="toggle-mode-text">Oscuro</span>
          </label>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay">
      <div class="overlay-box">
        <p id="overlay-title">TETRIS</p>
        <p id="overlay-score"></p>
        <div id="name-input-section" style="display:none">
          <input type="text" id="player-name" class="name-input" maxlength="20" placeholder="Tu nombre" />
          <button id="save-record-btn" class="btn">Guardar</button>
        </div>
        <div id="records-section" style="display:none">
          <p class="records-title">RÉCORDS</p>
          <table id="records-table" class="records-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Puntos</th>
                <th>Combo</th>
                <th>Líneas</th>
              </tr>
            </thead>
            <tbody id="records-tbody"></tbody>
          </table>
          <button id="reset-records-btn" class="btn btn-secondary">Resetear récords</button>
        </div>
        <button id="restart-btn" class="btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
