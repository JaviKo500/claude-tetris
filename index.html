<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>
    <div class="game-container">
      <!-- Records panel — columna izquierda -->
      <div class="records-panel">
        <div class="records-header">
          <span class="label">RECORDS</span>
          <button id="reset-records-btn" class="reset-btn">Borrar</button>
        </div>
        <table class="records-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Pts</th>
              <th>L</th>
              <th>C</th>
            </tr>
          </thead>
          <tbody id="main-records-body"></tbody>
        </table>
      </div>

      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>

        <div class="panel-section">
          <span class="label">TEMA</span>
          <label class="theme-toggle-label" for="theme-toggle">
            <div class="toggle-switch">
              <input type="checkbox" id="theme-toggle" />
              <span class="toggle-slider"></span>
            </div>
            <span id="theme-mode-text" class="toggle-mode-text">Oscuro</span>
          </label>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Sección de nombre — se muestra solo cuando el score entra en el top 5 -->
        <div id="name-section" class="name-section hidden">
          <p class="name-prompt">¡Top 5! Introduce tu nombre</p>
          <div class="name-input-row">
            <input type="text" id="player-name" class="name-input" maxlength="12" placeholder="Tu nombre" />
            <button id="save-record-btn" class="save-btn">Guardar</button>
          </div>
        </div>

        <!-- Tabla de records en el overlay de game over -->
        <div id="overlay-records" class="overlay-records hidden">
          <table class="records-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Puntos</th>
                <th>Líneas</th>
                <th>Combo</th>
              </tr>
            </thead>
            <tbody id="overlay-records-body"></tbody>
          </table>
        </div>

        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
